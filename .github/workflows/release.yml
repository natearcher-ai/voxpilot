name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip version-bump commits from this workflow to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

      # Auto-bump patch version on main push (not on tag push)
      - name: Bump patch version
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          git add package.json package-lock.json
          git commit -m "chore: bump to $NEW_VERSION [skip ci]"
          git tag "$NEW_VERSION"
          git push origin main --tags

      # Use existing tag version on tag push
      - name: Get tag version
        if: "startsWith(github.ref, 'refs/tags/')"
        run: echo "NEW_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - run: npx @vscode/vsce package --allow-missing-repository

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_VERSION }}
          files: "*.vsix"
          generate_release_notes: true
